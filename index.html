<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আল-কোরআন</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Uthmanic';
  src: url('./UthmanicHafs_V22.ttf') format('truetype');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream:   #faf8f4;
  --cream2:  #f5f2eb;
  --cream3:  #ede9e0;
  --warm1:   #ffffff;
  --border:  #e6e1d8;
  --border2: #cdc9bf;
  --ink:     #1c1a17;
  --ink2:    #4a4540;
  --ink3:    #8a8278;
  --ink4:    #b8b3ab;
  --gold:    #b8922a;
  --gold-l:  #f7edd8;
  --gold-ll: #fdf8f0;
  --r:       12px;
  --disp:    'Cormorant Garamond', Georgia, serif;
  --sans:    'Jost', 'Segoe UI', sans-serif;
}
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  display: flex; flex-direction: column;
  overflow: hidden;
  font-size: 14.5px;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  background: var(--warm1);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex; align-items: center; gap: 18px;
  height: 58px; flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.logo-emblem {
  width: 36px; height: 36px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Uthmanic'; font-size: 15px; color: var(--gold);
}
.logo-text-wrap { line-height: 1.2; }
.logo-ar { font-family: var(--disp); font-size: 13px; font-style: italic; color: var(--ink3); letter-spacing: 0.5px; }
.logo-bn { font-family: var(--disp); font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.2px; }

.search-wrap { flex: 1; max-width: 440px; position: relative; }
.search-input {
  width: 100%; padding: 8px 16px 8px 36px;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 24px; color: var(--ink);
  font-family: var(--sans); font-size: 13px;
  outline: none; transition: all 0.2s;
}
.search-input:focus { border-color: var(--gold); background: var(--warm1); box-shadow: 0 0 0 3px rgba(184,146,42,0.1); }
.search-input::placeholder { color: var(--ink4); }
.s-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink4); font-size: 13px; pointer-events: none; }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.btn-sm {
  padding: 6px 15px; font-size: 12.5px; font-family: var(--sans); font-weight: 500;
  border: 1px solid var(--border2); border-radius: 20px;
  background: var(--warm1); color: var(--ink2); cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.btn-sm:hover { background: var(--cream); border-color: var(--gold); color: var(--gold); }
.btn-sm.on { background: var(--gold); color: #fff; border-color: var(--gold); }
.stats { font-size: 11px; color: var(--ink4); white-space: nowrap; text-align: right; line-height: 1.7; letter-spacing: 0.2px; }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 276px; background: var(--warm1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.24s cubic-bezier(.4,0,.2,1);
}
.sidebar.hidden { width: 0; overflow: hidden; }

.stabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
  padding: 0 12px; gap: 4px; background: var(--warm1);
}
.stab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 12.5px;
  font-weight: 500; font-family: var(--sans);
  color: var(--ink3); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.16s; letter-spacing: 0.3px;
}
.stab.active { color: var(--gold); border-bottom-color: var(--gold); }
.stab:hover:not(.active) { color: var(--ink2); }

.side-search { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-search input {
  width: 100%; padding: 7px 12px; background: var(--cream); border: 1px solid var(--border);
  border-radius: 8px; color: var(--ink); font-family: var(--sans); font-size: 12.5px; outline: none; transition: all 0.16s;
}
.side-search input:focus { border-color: var(--gold); background: var(--warm1); }
.side-search input::placeholder { color: var(--ink4); }

.side-list { flex: 1; overflow-y: auto; }
.side-list::-webkit-scrollbar { width: 3px; }
.side-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.s-item {
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  transition: all 0.14s;
}
.s-item:hover { background: var(--cream); }
.s-item.active { background: var(--gold-ll); border-left: 2.5px solid var(--gold); }

.s-num {
  width: 28px; height: 28px; border: 1px solid var(--border2);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; color: var(--ink3); flex-shrink: 0; font-weight: 600;
}
.s-item.active .s-num { background: var(--gold); border-color: var(--gold); color: #fff; }

.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.s-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.s-item.active .s-name { color: var(--gold); }
.s-ar { font-family: 'Uthmanic'; font-size: 17px; color: var(--ink4); direction: rtl; }
.s-item.active .s-ar { color: var(--gold); }

/* MAIN */
.main { flex: 1; overflow-y: auto; background: var(--cream); }
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* SURAH HEADER */
.surah-hdr {
  background: var(--warm1);
  border-bottom: 1px solid var(--border);
  padding: 40px 52px 32px;
  text-align: center;
  position: relative; overflow: hidden;
}
.surah-hdr::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 48px; height: 2px; background: var(--gold); border-radius: 2px;
}
.surah-ornament { font-size: 11px; color: var(--gold); letter-spacing: 8px; margin-bottom: 14px; opacity: 0.6; }
.surah-hdr-ar {
  font-family: 'Uthmanic'; font-size: 40px;
  color: var(--ink); direction: rtl; margin-bottom: 10px; line-height: 1.5;
}
.surah-hdr-name {
  font-family: var(--disp); font-size: 26px; font-weight: 600;
  color: var(--ink); letter-spacing: -0.3px; margin-bottom: 16px;
}
.surah-hdr-meta { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.badge {
  padding: 4px 13px; background: var(--cream);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 11.5px; color: var(--ink2); font-weight: 500; letter-spacing: 0.2px;
}
.badge.gold { background: var(--gold-l); border-color: rgba(184,146,42,0.3); color: var(--gold); }

.bismillah {
  font-family: 'Uthmanic'; font-size: 28px; color: var(--ink2);
  direction: rtl; text-align: center; padding: 22px 52px;
  border-bottom: 1px solid var(--border); background: var(--gold-ll);
  letter-spacing: 1px; line-height: 2;
}

/* CONTENT TABS */
.ctabs {
  display: flex; gap: 4px; padding: 10px 52px;
  border-bottom: 1px solid var(--border); background: var(--warm1);
  position: sticky; top: 0; z-index: 10;
}
.ctab {
  padding: 5px 14px; font-size: 12.5px; font-weight: 500;
  font-family: var(--sans); border-radius: 20px; cursor: pointer;
  color: var(--ink3); transition: all 0.15s;
  border: 1px solid transparent; background: transparent; letter-spacing: 0.2px;
}
.ctab.active { background: var(--gold); color: #fff; border-color: var(--gold); }
.ctab:hover:not(.active) { background: var(--cream); color: var(--ink2); border-color: var(--border); }

/* AYAH LIST */
.ayah-list { padding: 0 52px 80px; max-width: 880px; margin: 0 auto; width: 100%; }
.ayah-card {
  padding: 30px 0; border-bottom: 1px solid var(--border);
  display: flex; gap: 22px;
  animation: ayahIn 0.35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes ayahIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.a-num-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 6px; }
.a-num {
  width: 32px; height: 32px; border: 1px solid var(--border2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--ink3); font-weight: 600; background: var(--warm1);
}
.a-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }
.a-body { flex: 1; }
.a-arabic {
  font-family: 'Uthmanic'; font-size: 31px; line-height: 2.25;
  color: var(--ink); direction: rtl; text-align: right; margin-bottom: 16px;
}
.a-bangla {
  font-size: 14.5px; line-height: 2; color: var(--ink2);
  padding: 10px 16px; background: var(--cream2);
  border-radius: 0 8px 8px 0; border-left: 2px solid var(--gold);
}
.a-key {
  font-size: 10.5px; color: var(--ink4); margin-top: 10px;
  font-weight: 500; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 5px;
}
.a-key::before { content: ''; display: inline-block; width: 12px; height: 1px; background: var(--border2); }

/* SEARCH */
.search-section { padding: 24px 52px 80px; max-width: 880px; margin: 0 auto; width: 100%; }
.search-hdr {
  font-size: 13px; color: var(--ink3); margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.search-hdr-q { font-family: var(--disp); font-size: 17px; color: var(--ink); font-style: italic; }
.search-hit {
  padding: 22px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.search-hit:hover { background: var(--gold-ll); padding: 22px 14px; margin: 0 -14px; border-radius: 10px; border-color: transparent; }
.hit-surah { font-size: 11px; color: var(--gold); margin-bottom: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
mark { background: var(--gold-l); color: var(--gold); border-radius: 3px; padding: 1px 3px; font-style: normal; }

/* EMPTY */
.empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; min-height: 100%;
  padding: 80px 20px; text-align: center;
}
.empty-ar { font-family: 'Uthmanic'; font-size: 64px; color: var(--gold); opacity: 0.18; margin-bottom: 8px; direction: rtl; }
.empty-rule { width: 40px; height: 1.5px; background: var(--gold); margin: 6px auto; opacity: 0.4; }
.empty-title { font-family: var(--disp); font-size: 24px; font-weight: 600; color: var(--ink); letter-spacing: -0.3px; }
.empty-sub { font-size: 13.5px; color: var(--ink3); line-height: 1.9; }

/* LOADING */
.loading { text-align: center; padding: 80px; color: var(--ink3); }
.spinner {
  display: inline-block; width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* READING MODE */
.reading-mode .sidebar { width: 0; overflow: hidden; }
.reading-mode .a-arabic { font-size: 36px; }
.reading-mode .a-bangla { font-size: 16px; }

@media (max-width: 900px) {
  .sidebar { width: 240px; }
  .ayah-list, .search-section { padding-left: 20px; padding-right: 20px; }
  .surah-hdr, .bismillah, .ctabs { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-emblem">ق</div>
    <div class="logo-text-wrap">
      <div class="logo-ar">Al-Qur'an</div>
      <div class="logo-bn">কোরআন মাজীদ</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input class="search-input" id="gSearch" type="text" placeholder="বাংলায় খুঁজুন… রহমত, নামাজ, জান্নাত, সবর">
  </div>
  <div class="header-right">
    <button class="btn-sm" id="readBtn" onclick="toggleReading()">📖 রিডিং মোড</button>
    <div class="stats" id="statsEl">লোড হচ্ছে…</div>
  </div>
</div>

<div class="layout" id="layout">
  <div class="sidebar" id="sidebar">
    <div class="stabs">
      <button class="stab active" onclick="switchTab('surah',this)">সূরা</button>
      <button class="stab" onclick="switchTab('juz',this)">পারা</button>
    </div>
    <div class="side-search">
      <input type="text" id="sideFilter" placeholder="সূরা খুঁজুন…" oninput="filterSide(this.value)">
    </div>
    <div class="side-list" id="sideList"></div>
  </div>

  <div class="main" id="mainEl">
    <div class="loading"><div class="spinner"></div><div>ডেটা লোড হচ্ছে…</div></div>
  </div>
</div>

<script>
const toBn = n => String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);

const SURAH_BN = {
  1:'আল-ফাতিহা',2:'আল-বাকারা',3:'আল-ইমরান',4:'আন-নিসা',5:'আল-মায়িদা',
  6:'আল-আনআম',7:'আল-আরাফ',8:'আল-আনফাল',9:'আত-তাওবা',10:'ইউনুস',
  11:'হুদ',12:'ইউসুফ',13:'আর-রাদ',14:'ইবরাহীম',15:'আল-হিজর',
  16:'আন-নাহল',17:'আল-ইসরা',18:'আল-কাহফ',19:'মারইয়াম',20:'ত্বহা',
  21:'আল-আম্বিয়া',22:'আল-হজ',23:'আল-মুমিনুন',24:'আন-নূর',25:'আল-ফুরকান',
  26:'আশ-শুআরা',27:'আন-নামল',28:'আল-কাসাস',29:'আল-আনকাবুত',30:'আর-রূম',
  31:'লুকমান',32:'আস-সাজদা',33:'আল-আহযাব',34:'সাবা',35:'ফাতির',
  36:'ইয়াসীন',37:'আস-সাফফাত',38:'সোয়াদ',39:'আয-যুমার',40:'গাফির',
  41:'ফুসসিলাত',42:'আশ-শূরা',43:'আয-যুখরুফ',44:'আদ-দুখান',45:'আল-জাসিয়া',
  46:'আল-আহকাফ',47:'মুহাম্মাদ',48:'আল-ফাতহ',49:'আল-হুজুরাত',50:'কাফ',
  51:'আয-যারিয়াত',52:'আত-তূর',53:'আন-নাজম',54:'আল-কামার',55:'আর-রাহমান',
  56:'আল-ওয়াকিয়া',57:'আল-হাদীদ',58:'আল-মুজাদালা',59:'আল-হাশর',60:'আল-মুমতাহিনা',
  61:'আস-সাফ',62:'আল-জুমুআ',63:'আল-মুনাফিকুন',64:'আত-তাগাবুন',65:'আত-তালাক',
  66:'আত-তাহরীম',67:'আল-মুলক',68:'আল-কলম',69:'আল-হাক্কা',70:'আল-মাআরিজ',
  71:'নূহ',72:'আল-জিন',73:'আল-মুযযাম্মিল',74:'আল-মুদ্দাসসির',75:'আল-কিয়ামা',
  76:'আল-ইনসান',77:'আল-মুরসালাত',78:'আন-নাবা',79:'আন-নাযিআত',80:'আবাসা',
  81:'আত-তাকভীর',82:'আল-ইনফিতার',83:'আল-মুতাফফিফীন',84:'আল-ইনশিকাক',85:'আল-বুরূজ',
  86:'আত-তারিক',87:'আল-আলা',88:'আল-গাশিয়া',89:'আল-ফাজর',90:'আল-বালাদ',
  91:'আশ-শামস',92:'আল-লাইল',93:'আদ-দুহা',94:'আশ-শারহ',95:'আত-তীন',
  96:'আল-আলাক',97:'আল-কদর',98:'আল-বাইয়িনা',99:'আয-যিলযাল',100:'আল-আদিয়াত',
  101:'আল-কারিআ',102:'আত-তাকাসুর',103:'আল-আসর',104:'আল-হুমাযা',105:'আল-ফীল',
  106:'কুরাইশ',107:'আল-মাউন',108:'আল-কাওসার',109:'আল-কাফিরুন',110:'আন-নাসর',
  111:'আল-মাসাদ',112:'আল-ইখলাস',113:'আল-ফালাক',114:'আন-নাস'
};

let SURAHS={}, AYAHS={}, JUZ={}, BN={};
let ayahBySurah={};
let currentSurah=null, currentTab='surah', viewMode='read', readingMode=false;

function bn(n) {
  return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

async function loadAll() {
  try {
    const [s,a,j,b] = await Promise.all([
      fetch('./quran-metadata-surah-name.json').then(r=>r.json()),
      fetch('./quran-metadata-ayah.json').then(r=>r.json()),
      fetch('./quran-metadata-juz.json').then(r=>r.json()),
      fetch('./bn-taisirul-quran-simple.json').then(r=>r.json()),
    ]);
    SURAHS=s; AYAHS=a; JUZ=j; BN=b;
    Object.values(AYAHS).forEach(a=>{
      if(!ayahBySurah[a.surah_number]) ayahBySurah[a.surah_number]=[];
      ayahBySurah[a.surah_number].push(a);
    });
    document.getElementById('statsEl').innerHTML='৬২৩৬ আয়াত<br>১১৪ সূরা · ৩০ পারা';
    renderSideList(Object.values(SURAHS));
    showEmpty();
  } catch(e) {
    document.getElementById('mainEl').innerHTML=`<div class="empty"><div class="empty-ar">القرآن</div><div class="empty-title">ফাইল লোড হয়নি</div><div class="empty-sub">সব JSON ফাইল একই ফোল্ডারে আছে কিনা দেখুন<br>Python server চালু আছে কিনা নিশ্চিত করুন</div></div>`;
  }
}

function showEmpty() {
  document.getElementById('mainEl').innerHTML=`
    <div class="empty">
      <div class="empty-ar">بِسْمِ ٱللَّهِ</div>
      <div class="empty-rule"></div>
      <div class="empty-title">আল-কোরআনুল কারীম</div>
      <div class="empty-sub">বাম থেকে একটি সূরা বেছে নিন<br>অথবা উপরে বাংলায় সার্চ করুন</div>
    </div>`;
}

function renderSideList(list) {
  document.getElementById('sideList').innerHTML=list.map(s=>`
    <div class="s-item ${currentSurah==s.id?'active':''}" onclick="loadSurah(${s.id})">
      <div class="s-num">${toBn(s.id)}</div>
      <div class="s-info">
        <div class="s-name">${SURAH_BN[s.id]||s.name_simple}</div>
        <div class="s-meta">${s.revelation_place==='makkah'?'মক্কী':'মাদানী'} · ${toBn(s.verses_count)} আয়াত</div>
      </div>
      <div class="s-ar">${s.name_arabic}</div>
    </div>`).join('');
}

function filterSide(q) {
  if(currentTab==='juz'){renderJuzSide(q);return;}
  renderSideList(Object.values(SURAHS).filter(s=>
    s.name_simple.toLowerCase().includes(q.toLowerCase())||
    s.name_arabic.includes(q)||String(s.id).includes(q)
  ));
}

function switchTab(tab,el) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); currentTab=tab;
  document.getElementById('sideFilter').value='';
  if(tab==='surah'){
    document.getElementById('sideFilter').placeholder='সূরা খুঁজুন…';
    renderSideList(Object.values(SURAHS));
  } else {
    document.getElementById('sideFilter').placeholder='পারা খুঁজুন…';
    renderJuzSide('');
  }
}

function renderJuzSide(q) {
  document.getElementById('sideList').innerHTML=Object.values(JUZ)
    .filter(j=>!q||String(j.juz_number).includes(q))
    .map(j=>`<div class="s-item" onclick="loadJuz(${j.juz_number})">
      <div class="s-num">${toBn(j.juz_number)}</div>
      <div class="s-info">
        <div class="s-name">পারা ${toBn(j.juz_number)}</div>
        <div class="s-meta">${toBn(j.verses_count)} আয়াত · ${toBn(j.first_verse_key)}–${toBn(j.last_verse_key)}</div>
      </div>
    </div>`).join('');
}

function loadSurah(id) {
  currentSurah=id;
  const s=SURAHS[id], ayahs=ayahBySurah[id]||[];
  renderSideList(Object.values(SURAHS));
  const bismillah=(id!==1&&id!==9&&s.bismillah_pre)
    ?`<div class="bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>`:'';
  document.getElementById('mainEl').innerHTML=`
    <div class="surah-hdr">
      <div class="surah-ornament">✦ ✦ ✦</div>
      <div class="surah-hdr-ar">${s.name_arabic}</div>
      <div class="surah-hdr-name">${SURAH_BN[id]||s.name_simple}</div>
      <div class="surah-hdr-meta">
        <span class="badge gold">${s.revelation_place==='makkah'?'মক্কী':'মাদানী'}</span>
        <span class="badge">${toBn(s.verses_count)} আয়াত</span>
        <span class="badge">সূরা ${toBn(id)}</span>
      </div>
    </div>${bismillah}
    <div class="ctabs">
      <button class="ctab ${viewMode==='read'?'active':''}" onclick="setView('read',this)">আরবি + বাংলা</button>
      <button class="ctab ${viewMode==='arabic'?'active':''}" onclick="setView('arabic',this)">শুধু আরবি</button>
      <button class="ctab ${viewMode==='bangla'?'active':''}" onclick="setView('bangla',this)">শুধু বাংলা</button>
    </div>
    <div class="ayah-list" id="ayahList">${ayahs.map((a,i)=>ayahHtml(a,viewMode,i)).join('')}</div>`;
  document.getElementById('mainEl').scrollTop=0;
}

function ayahHtml(a,mode,i=0) {
  const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
  const delay=Math.min(i*18,240);
  const ar=mode!=='bangla'?`<div class="a-arabic">${a.text}</div>`:'';
  const bn2=mode!=='arabic'?`<div class="a-bangla">${bn}</div>`:'';
  return `<div class="ayah-card" style="animation-delay:${delay}ms">
    <div class="a-num-wrap"><div class="a-num">${toBn(a.ayah_number)}</div><div class="a-dot"></div></div>
    <div class="a-body">${ar}${bn2}<div class="a-key">আয়াত ${toBn(a.verse_key)}</div></div>
  </div>`;
}

function setView(mode,btn) {
  viewMode=mode;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!currentSurah)return;
  document.getElementById('ayahList').innerHTML=(ayahBySurah[currentSurah]||[]).map((a,i)=>ayahHtml(a,mode,i)).join('');
}

function loadJuz(num) {
  const j=JUZ[num]; let ayahs=[];
  for(const [sid,range] of Object.entries(j.verse_mapping)){
    const [s,e]=range.split('-').map(Number);
    (ayahBySurah[parseInt(sid)]||[]).filter(a=>a.ayah_number>=s&&a.ayah_number<=e).forEach(a=>ayahs.push(a));
  }
  document.getElementById('mainEl').innerHTML=`
    <div class="surah-hdr">
      <div class="surah-ornament">✦ ✦ ✦</div>
      <div class="surah-hdr-name" style="font-size:28px">পারা ${toBn(num)}</div>
      <div class="surah-hdr-meta">
        <span class="badge">${toBn(j.verses_count)} আয়াত</span>
        <span class="badge">${toBn(j.first_verse_key)} — ${toBn(j.last_verse_key)}</span>
      </div>
    </div>
    <div class="ctabs">
      <button class="ctab active" onclick="setJuzView('read',this,${num})">আরবি + বাংলা</button>
      <button class="ctab" onclick="setJuzView('arabic',this,${num})">শুধু আরবি</button>
      <button class="ctab" onclick="setJuzView('bangla',this,${num})">শুধু বাংলা</button>
    </div>
    <div class="ayah-list" id="ayahList">${ayahs.map((a,i)=>ayahHtml(a,'read',i)).join('')}</div>`;
  document.getElementById('mainEl').scrollTop=0;
}

function setJuzView(mode,btn,num) {
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const j=JUZ[num]; let ayahs=[];
  for(const [sid,range] of Object.entries(j.verse_mapping)){
    const [s,e]=range.split('-').map(Number);
    (ayahBySurah[parseInt(sid)]||[]).filter(a=>a.ayah_number>=s&&a.ayah_number<=e).forEach(a=>ayahs.push(a));
  }
  document.getElementById('ayahList').innerHTML=ayahs.map((a,i)=>ayahHtml(a,mode,i)).join('');
}

function toggleReading() {
  readingMode=!readingMode;
  document.getElementById('layout').classList.toggle('reading-mode',readingMode);
  document.getElementById('readBtn').classList.toggle('on',readingMode);
  document.getElementById('readBtn').textContent=readingMode?'✕ নরমাল':'📖 রিডিং মোড';
}

let searchTimer;
document.getElementById('gSearch').addEventListener('input',function(){
  clearTimeout(searchTimer);
  const q=this.value.trim();
  if(!q){currentSurah?loadSurah(currentSurah):showEmpty();return;}
  searchTimer=setTimeout(()=>doSearch(q),280);
});

function doSearch(q) {
  const ql=q.toLowerCase();
  const results=Object.values(AYAHS).filter(a=>{
    const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
    return bn.toLowerCase().includes(ql)||a.text.includes(q)||a.verse_key.includes(q);
  }).slice(0,150);
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp(esc,'gi');
  const hi=t=>t.replace(re,m=>`<mark>${m}</mark>`);
  document.getElementById('mainEl').innerHTML=`
    <div class="search-section">
      <div class="search-hdr">
        <span class="search-hdr-q">"${q}"</span>
        <span>— ${toBn(results.length)} টি ফলাফল</span>
      </div>
      ${results.map(a=>{
        const s=SURAHS[a.surah_number];
        const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
        return `<div class="search-hit" onclick="loadSurah(${a.surah_number})">
          <div class="hit-surah">${SURAH_BN[a.surah_number]||s.name_simple} (${s.name_arabic}) — আয়াত ${toBn(a.verse_key)}</div>
          <div class="a-arabic" style="font-size:23px;margin-bottom:12px">${a.text}</div>
          <div class="a-bangla">${hi(bn)}</div>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('mainEl').scrollTop=0;
}

loadAll();
</script>
