<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কোরআন শরীফ</title>
<style>
@font-face {
  font-family: 'Uthmanic';
  src: url('./UthmanicHafs_V22.ttf') format('truetype');
}
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f7f4ef;
  --bg2:     #ffffff;
  --bg3:     #f0ece4;
  --border:  #e0d8cc;
  --accent:  #7c5c2e;
  --accent2: #b08040;
  --gold:    #c8922a;
  --gold2:   #f5e6c8;
  --text:    #1a1510;
  --text2:   #5c4a32;
  --text3:   #a08060;
  --shadow:  0 2px 12px rgba(100,70,30,0.08);
  --shadow2: 0 4px 24px rgba(100,70,30,0.13);
}
html, body { height: 100%; }
body { font-family: 'Segoe UI','Nirmala UI',sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; font-size: 16px; }

.header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 28px; display: flex; align-items: center; gap: 18px;
  height: 62px; flex-shrink: 0; box-shadow: var(--shadow); z-index: 50;
}
.logo { display: flex; align-items: center; gap: 11px; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: white; box-shadow: 0 2px 8px rgba(124,92,46,0.3);
}
.logo-text { font-size: 17px; font-weight: 700; color: var(--accent); }
.logo-sub  { font-size: 11px; color: var(--text3); margin-top: -2px; }

.search-wrap { flex: 1; max-width: 520px; position: relative; }
.search-input {
  width: 100%; padding: 9px 16px 9px 42px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: 24px; color: var(--text); font-size: 14px;
  outline: none; font-family: inherit; transition: border 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(176,128,64,0.12); }
.search-input::placeholder { color: var(--text3); }
.s-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.btn-sm {
  padding: 7px 16px; font-size: 13px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--bg2); color: var(--text2);
  cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap; font-weight: 500;
}
.btn-sm:hover { background: var(--gold2); border-color: var(--accent2); color: var(--accent); }
.btn-sm.on  { background: var(--accent); color: #fff; border-color: var(--accent); }
.stats { font-size: 11px; color: var(--text3); white-space: nowrap; text-align: right; line-height: 1.6; }

.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 290px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.25s; box-shadow: 2px 0 8px rgba(100,70,30,0.04);
}
.sidebar.hidden { width: 0; overflow: hidden; }
.stabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg3); }
.stab {
  flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--text3); cursor: pointer; border-bottom: 2.5px solid transparent;
  transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit;
}
.stab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg2); }
.side-search { padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-search input {
  width: 100%; padding: 7px 11px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none; font-family: inherit;
}
.side-list { flex: 1; overflow-y: auto; }
.side-list::-webkit-scrollbar { width: 4px; }
.side-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.s-item {
  padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 11px; transition: background 0.12s;
}
.s-item:hover { background: var(--gold2); }
.s-item.active { background: var(--gold2); border-left: 3px solid var(--accent); }
.s-num {
  width: 30px; height: 30px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text3); flex-shrink: 0; font-weight: 600;
}
.s-item.active .s-num { background: var(--accent); color: #fff; border-color: var(--accent); }
.s-info { flex: 1; min-width: 0; }
.s-name { font-size: 13px; font-weight: 600; color: var(--text); }
.s-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.s-ar   { font-family: 'Uthmanic'; font-size: 17px; color: var(--gold); direction: rtl; }

/* MAIN */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.surah-hdr {
  background: linear-gradient(135deg, #fffdf7 0%, var(--gold2) 100%);
  border-bottom: 1px solid var(--border); padding: 28px 40px; text-align: center;
}
.surah-hdr-ar   { font-family: 'Uthmanic'; font-size: 38px; color: var(--accent); direction: rtl; margin-bottom: 8px; }
.surah-hdr-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.surah-hdr-meta { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.badge { padding: 3px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; font-size: 12px; color: var(--text2); font-weight: 500; }

.bismillah {
  font-family: 'Uthmanic'; font-size: 28px; color: var(--accent2);
  direction: rtl; text-align: center; padding: 18px 40px;
  border-bottom: 1px solid var(--border); background: var(--bg2);
}

.ctabs {
  display: flex; gap: 6px; padding: 12px 40px;
  border-bottom: 1px solid var(--border); background: var(--bg2);
  position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow);
}
.ctab {
  padding: 6px 16px; font-size: 13px; font-weight: 500; border-radius: 7px;
  cursor: pointer; color: var(--text3); transition: all 0.15s;
  border: 1.5px solid transparent; background: transparent; font-family: inherit;
}
.ctab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.ctab:hover:not(.active) { background: var(--gold2); color: var(--accent); border-color: var(--border); }

.ayah-list { padding: 0 40px 60px; max-width: 900px; margin: 0 auto; width: 100%; }
.ayah-card { padding: 22px 0; border-bottom: 1px solid var(--border); display: flex; gap: 16px; }
.a-num {
  width: 36px; height: 36px; flex-shrink: 0; border: 1.5px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text3); margin-top: 6px; font-weight: 600; background: var(--bg2);
}
.a-body { flex: 1; }
.a-arabic {
  font-family: 'Uthmanic'; font-size: 30px; line-height: 2.1;
  color: var(--text); direction: rtl; text-align: right; margin-bottom: 12px;
}
.a-bangla {
  font-size: 15px; line-height: 1.9; color: var(--text2);
  border-left: 3px solid var(--gold); padding: 4px 0 4px 14px;
  background: linear-gradient(to right, rgba(200,146,42,0.06), transparent);
  border-radius: 0 6px 6px 0;
}
.a-key { font-size: 11px; color: var(--text3); margin-top: 8px; font-weight: 500; }

.search-section { padding: 20px 40px 60px; max-width: 900px; margin: 0 auto; width: 100%; }
.search-hdr { font-size: 14px; color: var(--text3); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.search-hit { padding: 18px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.12s; border-radius: 4px; }
.search-hit:hover { background: var(--gold2); padding: 18px 10px; margin: 0 -10px; border-radius: 8px; }
.hit-surah { font-size: 12px; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
mark { background: rgba(200,146,42,0.25); color: var(--accent); border-radius: 3px; padding: 0 2px; font-style: normal; }

.empty {
  text-align: center; padding: 100px 20px; color: var(--text3);
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
}
.empty-icon { font-size: 56px; opacity: 0.5; }
.empty-title { font-size: 20px; color: var(--text2); font-weight: 600; }
.empty-sub { font-size: 14px; line-height: 1.8; }

.loading { text-align: center; padding: 60px; color: var(--text3); }
.spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.reading-mode .sidebar { width: 0; overflow: hidden; }
.reading-mode .a-arabic { font-size: 34px; }
.reading-mode .a-bangla { font-size: 17px; }

@media (max-width: 900px) {
  .sidebar { width: 240px; }
  .ayah-list, .search-section { padding: 0 20px 60px; }
  .surah-hdr { padding: 22px 24px; }
  .ctabs { padding: 10px 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">☪</div>
    <div>
      <div class="logo-text">আল-কোরআন</div>
      <div class="logo-sub">তাইসিরুল কোরআন</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input class="search-input" id="gSearch" type="text" placeholder="বাংলায় খুঁজুন… যেমন: রহমত, নামাজ, জান্নাত, সবর">
  </div>
  <div class="header-right">
    <button class="btn-sm" id="readBtn" onclick="toggleReading()">📖 রিডিং মোড</button>
    <div class="stats" id="statsEl">লোড হচ্ছে…</div>
  </div>
</div>

<div class="layout" id="layout">
  <div class="sidebar" id="sidebar">
    <div class="stabs">
      <button class="stab active" onclick="switchTab('surah',this)">সূরা</button>
      <button class="stab" onclick="switchTab('juz',this)">পারা</button>
    </div>
    <div class="side-search">
      <input type="text" id="sideFilter" placeholder="সূরা খুঁজুন…" oninput="filterSide(this.value)">
    </div>
    <div class="side-list" id="sideList"></div>
  </div>

  <div class="main" id="mainEl">
    <div class="loading"><div class="spinner"></div><div>ডেটা লোড হচ্ছে…</div></div>
  </div>
</div>

<script>
let SURAHS={}, AYAHS={}, JUZ={}, BN={};
let ayahBySurah={};
let currentSurah=null, currentTab='surah', viewMode='read', readingMode=false;

async function loadAll() {
  try {
    const [s,a,j,b] = await Promise.all([
      fetch('./quran-metadata-surah-name.json').then(r=>r.json()),
      fetch('./quran-metadata-ayah.json').then(r=>r.json()),
      fetch('./quran-metadata-juz.json').then(r=>r.json()),
      fetch('./bn-taisirul-quran-simple.json').then(r=>r.json()),
    ]);
    SURAHS=s; AYAHS=a; JUZ=j; BN=b;
    Object.values(AYAHS).forEach(a=>{
      if(!ayahBySurah[a.surah_number]) ayahBySurah[a.surah_number]=[];
      ayahBySurah[a.surah_number].push(a);
    });
    document.getElementById('statsEl').innerHTML='৬২৩৬ আয়াত<br>১১৪ সূরা · ৩০ পারা';
    renderSideList(Object.values(SURAHS));
    showEmpty();
  } catch(e) {
    document.getElementById('mainEl').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">ফাইল লোড হয়নি</div><div class="empty-sub">সব JSON ফাইল একই ফোল্ডারে আছে কিনা দেখুন<br>Python server চালু আছে কিনা নিশ্চিত করুন</div></div>`;
  }
}

function showEmpty() {
  document.getElementById('mainEl').innerHTML=`<div class="empty"><div class="empty-icon">☪</div><div class="empty-title">আল-কোরআনুল কারীম</div><div class="empty-sub">বাম থেকে একটি সূরা বেছে নিন<br>অথবা উপরে বাংলায় সার্চ করুন</div></div>`;
}

function renderSideList(list) {
  document.getElementById('sideList').innerHTML=list.map(s=>`
    <div class="s-item ${currentSurah==s.id?'active':''}" onclick="loadSurah(${s.id})">
      <div class="s-num">${s.id}</div>
      <div class="s-info">
        <div class="s-name">${s.name_simple}</div>
        <div class="s-meta">${s.revelation_place==='makkah'?'মক্কী':'মাদানী'} · ${s.verses_count} আয়াত</div>
      </div>
      <div class="s-ar">${s.name_arabic}</div>
    </div>`).join('');
}

function filterSide(q) {
  if(currentTab==='juz'){renderJuzSide(q);return;}
  renderSideList(Object.values(SURAHS).filter(s=>
    s.name_simple.toLowerCase().includes(q.toLowerCase())||
    s.name_arabic.includes(q)||String(s.id).includes(q)
  ));
}

function switchTab(tab,el) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); currentTab=tab;
  document.getElementById('sideFilter').value='';
  if(tab==='surah'){
    document.getElementById('sideFilter').placeholder='সূরা খুঁজুন…';
    renderSideList(Object.values(SURAHS));
  } else {
    document.getElementById('sideFilter').placeholder='পারা খুঁজুন…';
    renderJuzSide('');
  }
}

function renderJuzSide(q) {
  document.getElementById('sideList').innerHTML=Object.values(JUZ)
    .filter(j=>!q||String(j.juz_number).includes(q))
    .map(j=>`<div class="s-item" onclick="loadJuz(${j.juz_number})">
      <div class="s-num" style="color:var(--accent)">${j.juz_number}</div>
      <div class="s-info">
        <div class="s-name">পারা ${j.juz_number}</div>
        <div class="s-meta">${j.verses_count} আয়াত · ${j.first_verse_key}–${j.last_verse_key}</div>
      </div>
    </div>`).join('');
}

function loadSurah(id) {
  currentSurah=id;
  const s=SURAHS[id], ayahs=ayahBySurah[id]||[];
  renderSideList(Object.values(SURAHS));
  const bismillah=(id!==1&&id!==9&&s.bismillah_pre)
    ?`<div class="bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>`:'';
  document.getElementById('mainEl').innerHTML=`
    <div class="surah-hdr">
      <div class="surah-hdr-ar">${s.name_arabic}</div>
      <div class="surah-hdr-name">${s.name_simple}</div>
      <div class="surah-hdr-meta">
        <span class="badge">${s.revelation_place==='makkah'?'🕋 মক্কী':'🕌 মাদানী'}</span>
        <span class="badge">${s.verses_count} আয়াত</span>
        <span class="badge">সূরা ${id}</span>
      </div>
    </div>${bismillah}
    <div class="ctabs">
      <button class="ctab ${viewMode==='read'?'active':''}" onclick="setView('read',this)">আরবি + বাংলা</button>
      <button class="ctab ${viewMode==='arabic'?'active':''}" onclick="setView('arabic',this)">শুধু আরবি</button>
      <button class="ctab ${viewMode==='bangla'?'active':''}" onclick="setView('bangla',this)">শুধু বাংলা</button>
    </div>
    <div class="ayah-list" id="ayahList">${ayahs.map(a=>ayahHtml(a,viewMode)).join('')}</div>`;
  document.getElementById('mainEl').scrollTop=0;
}

function ayahHtml(a,mode) {
  const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
  const ar=mode!=='bangla'?`<div class="a-arabic">${a.text}</div>`:'';
  const bn2=mode!=='arabic'?`<div class="a-bangla">${bn}</div>`:'';
  return `<div class="ayah-card"><div class="a-num">${a.ayah_number}</div><div class="a-body">${ar}${bn2}<div class="a-key">আয়াত ${a.verse_key}</div></div></div>`;
}

function setView(mode,btn) {
  viewMode=mode;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!currentSurah)return;
  document.getElementById('ayahList').innerHTML=(ayahBySurah[currentSurah]||[]).map(a=>ayahHtml(a,mode)).join('');
}

function loadJuz(num) {
  const j=JUZ[num]; let ayahs=[];
  for(const [sid,range] of Object.entries(j.verse_mapping)){
    const [s,e]=range.split('-').map(Number);
    (ayahBySurah[parseInt(sid)]||[]).filter(a=>a.ayah_number>=s&&a.ayah_number<=e).forEach(a=>ayahs.push(a));
  }
  document.getElementById('mainEl').innerHTML=`
    <div class="surah-hdr">
      <div class="surah-hdr-name" style="font-size:24px">পারা ${num}</div>
      <div class="surah-hdr-meta">
        <span class="badge">${j.verses_count} আয়াত</span>
        <span class="badge">${j.first_verse_key} — ${j.last_verse_key}</span>
      </div>
    </div>
    <div class="ctabs">
      <button class="ctab active" onclick="setJuzView('read',this,${num})">আরবি + বাংলা</button>
      <button class="ctab" onclick="setJuzView('arabic',this,${num})">শুধু আরবি</button>
      <button class="ctab" onclick="setJuzView('bangla',this,${num})">শুধু বাংলা</button>
    </div>
    <div class="ayah-list" id="ayahList">${ayahs.map(a=>ayahHtml(a,'read')).join('')}</div>`;
  document.getElementById('mainEl').scrollTop=0;
}

function setJuzView(mode,btn,num) {
  document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const j=JUZ[num]; let ayahs=[];
  for(const [sid,range] of Object.entries(j.verse_mapping)){
    const [s,e]=range.split('-').map(Number);
    (ayahBySurah[parseInt(sid)]||[]).filter(a=>a.ayah_number>=s&&a.ayah_number<=e).forEach(a=>ayahs.push(a));
  }
  document.getElementById('ayahList').innerHTML=ayahs.map(a=>ayahHtml(a,mode)).join('');
}

function toggleReading() {
  readingMode=!readingMode;
  document.getElementById('layout').classList.toggle('reading-mode',readingMode);
  document.getElementById('readBtn').classList.toggle('on',readingMode);
  document.getElementById('readBtn').textContent=readingMode?'✕ নরমাল':'📖 রিডিং মোড';
}

let searchTimer;
document.getElementById('gSearch').addEventListener('input',function(){
  clearTimeout(searchTimer);
  const q=this.value.trim();
  if(!q){currentSurah?loadSurah(currentSurah):showEmpty();return;}
  searchTimer=setTimeout(()=>doSearch(q),280);
});

function doSearch(q) {
  const ql=q.toLowerCase();
  const results=Object.values(AYAHS).filter(a=>{
    const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
    return bn.toLowerCase().includes(ql)||a.text.includes(q)||a.verse_key.includes(q);
  }).slice(0,150);
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp(esc,'gi');
  const hi=t=>t.replace(re,m=>`<mark>${m}</mark>`);
  document.getElementById('mainEl').innerHTML=`
    <div class="search-section">
      <div class="search-hdr">"${q}" — <strong>${results.length}</strong> টি ফলাফল</div>
      ${results.map(a=>{
        const s=SURAHS[a.surah_number];
        const bn=BN[a.verse_key]?BN[a.verse_key].t:'';
        return `<div class="search-hit" onclick="loadSurah(${a.surah_number})">
          <div class="hit-surah">${s.name_simple} (${s.name_arabic}) — আয়াত ${a.verse_key}</div>
          <div class="a-arabic" style="font-size:22px;margin-bottom:8px">${a.text}</div>
          <div class="a-bangla">${hi(bn)}</div>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('mainEl').scrollTop=0;
}

loadAll();
</script>
</body>
</html>
